<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet Status — Agentic AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="app.js"></script>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-cube"></i><span>AgenticAdmin</span></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
      <a href="vehicles.html" class="nav-link active"><i class="fa-solid fa-car"></i><span>Fleet Status</span></a>
      <a href="garages.html" class="nav-link"><i class="fa-solid fa-warehouse"></i><span>Garages</span></a>
      <a href="analytics.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i><span>AI Analytics</span></a>
    </nav>
    <div class="sidebar-footer">v3.0.0 — Moduled Edition</div>
  </aside>

  <header class="topbar">
    <div class="topbar-clock" id="liveClock">00:00:00</div>
    <div class="topbar-status"><span class="dot"></span> All Systems Operational</div>
    <div class="topbar-avatar" title="Admin Profile">A</div>
  </header>

  <main class="main">
    <section class="white-card animate-in">
      <div class="section-header">
        <h2><i class="fa-solid fa-table-list" style="color:var(--primary)"></i> Fleet Status Overview</h2>
        <div class="toolbar">
          <div class="search-box">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="vehicleSearch" placeholder="Search ID or Vehicle…" />
          </div>
          <select class="filter-select" id="statusFilter">
            <option value="all">All Conditions</option>
            <option value="critical">Critical</option>
            <option value="warning">Warning</option>
            <option value="healthy">Healthy</option>
          </select>
          <button class="btn-icon" title="Refresh Feed" onclick="refreshData()"><i class="fa-solid fa-arrows-rotate"></i></button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Vehicle Make &amp; Model</th>
              <th>Health Score</th>
              <th>Predicted Failure</th>
              <th>Garage Status</th>
              <th>User Status</th>
            </tr>
          </thead>
          <tbody id="vehiclesTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script>
  function getHealthColor(h) { return h > 80 ? 'var(--success)' : h >= 50 ? 'var(--warning)' : 'var(--danger)'; }
  
  function getHealthIcon(h) {
      if(h > 80) return '✅';
      if(h >= 50) return '⚠️';
      return '🔴';
  }

  function getStatusBadge(statusStr) {
    if(!statusStr || statusStr === 'none') return '<span style="color:var(--text-muted);font-weight:500;">N/A</span>';
    if(statusStr === 'pending') return '<span class="badge badge-pending"><i class="fa-solid fa-clock"></i> Pending Reply</span>';
    if(statusStr === 'accepted') return '<span class="badge badge-accepted"><i class="fa-solid fa-check"></i> Accepted</span>';
    if(statusStr === 'declined') return '<span class="badge badge-suspended"><i class="fa-solid fa-xmark"></i> Declined</span>';
    return `<span class="badge badge-none">${statusStr}</span>`;
  }

  function renderVehicles() {
    const search = document.getElementById('vehicleSearch').value.toLowerCase();
    const filter = document.getElementById('statusFilter').value;
    
    const filtered = vehicles.filter(v => {
      const matchSearch = v.id.toLowerCase().includes(search) || v.model.toLowerCase().includes(search);
      const matchFilter = filter === 'all' || v.status === filter;
      return matchSearch && matchFilter;
    });

    document.getElementById('vehiclesTableBody').innerHTML = filtered.map(v => `
      <tr>
        <td style="font-weight:600;color:var(--text-secondary);">${v.id.replace('CAR-', '')}</td>
        <td style="font-weight:600;color:var(--primary);">${v.model}</td>
        <td style="font-weight:700;color:${getHealthColor(v.health)}">
          ${v.health}% ${getHealthIcon(v.health)}
        </td>
        <td style="color:var(--text-secondary);font-weight:500;">${v.failure}</td>
        <td>${getStatusBadge(v.garageApproval)}</td>
        <td>${getStatusBadge(v.userApproval)}</td>
      </tr>
    `).join('');
  }

  function refreshData() {
    // Just a dummy sync for the table view
    showToast('Platform feed synced. No new status changes.', 'info');
  }

  document.addEventListener('DOMContentLoaded', () => {
    // In case localstorage holds old values due to testing, let's override them for this demo
    vehicles.find(v => v.id === "CAR-001").garageApproval = "accepted";
    vehicles.find(v => v.id === "CAR-001").userApproval = "pending";
    
    vehicles.find(v => v.id === "CAR-003").garageApproval = "accepted";
    vehicles.find(v => v.id === "CAR-003").userApproval = "accepted";
    
    vehicles.find(v => v.id === "CAR-005").garageApproval = "pending";
    vehicles.find(v => v.id === "CAR-005").userApproval = "none";

    vehicles.find(v => v.id === "CAR-006").garageApproval = "declined";
    vehicles.find(v => v.id === "CAR-006").userApproval = "none";
    
    renderVehicles();
  });
</script>
</body>
</html>
