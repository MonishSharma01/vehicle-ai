<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garages — Agentic AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <script src="app.js"></script>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo"><i class="fa-solid fa-cube"></i><span>AgenticAdmin</span></div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
      <a href="vehicles.html" class="nav-link"><i class="fa-solid fa-car"></i><span>Fleet Status</span></a>
      <a href="garages.html" class="nav-link active"><i class="fa-solid fa-warehouse"></i><span>Garages</span></a>
      <a href="analytics.html" class="nav-link"><i class="fa-solid fa-chart-pie"></i><span>AI Analytics</span></a>
    </nav>
    <div class="sidebar-footer">v3.0.0 — Moduled Edition</div>
  </aside>

  <header class="topbar">
    <div class="topbar-clock" id="liveClock">00:00:00</div>
    <div class="topbar-status"><span class="dot"></span> All Systems Operational</div>
    <div class="topbar-avatar" title="Admin Profile">A</div>
  </header>

  <main class="main">
    <section class="white-card animate-in">
      <div class="section-header">
        <h2><i class="fa-solid fa-warehouse" style="color:var(--accent-teal)"></i> Partner Garages</h2>
        <div class="toolbar">
          <button class="btn-quick btn-primary" onclick="openAddGarageModal()"><i class="fa-solid fa-plus"></i> Onboard New Garage</button>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Garage Partner</th>
              <th>AI Dispatched Jobs</th>
              <th>Gross Revenue</th>
              <th>Satisfaction Rating</th>
              <th>Network Status</th>
            </tr>
          </thead>
          <tbody id="garageTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<!-- ADD GARAGE MODAL -->
<div class="modal-overlay" id="garageModalOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('garageModalOverlay')">&times;</button>
    <h3>Onboard New Garage</h3>
    <p class="modal-sub">Register a new partner facility to the platform.</p>
    
    <div class="form-group">
      <label for="gName">Facility Name</label>
      <input type="text" id="gName" class="form-control" placeholder="e.g., Downtown Auto Works">
    </div>
    <div class="form-group">
      <label for="gStatus">Initial Status</label>
      <select id="gStatus" class="form-control">
        <option value="active">Active (Ready)</option>
        <option value="warning-status">Onboarding (Review)</option>
      </select>
    </div>
    
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('garageModalOverlay')">Cancel</button>
      <button class="btn-confirm" onclick="submitGarage()">Add Garage</button>
    </div>
  </div>
</div>

<script>
  function renderGarages() {
    document.getElementById('garageTableBody').innerHTML = garages.map(g => {
      let badgeClass = g.status;
      let badgeText = g.status.replace('-', ' ').toUpperCase();
      return `
        <tr>
          <td style="font-weight:600;color:var(--primary);">${g.name}</td>
          <td><i class="fa-solid fa-wrench" style="color:var(--text-muted);font-size:0.8rem"></i> ${g.bookings}</td>
          <td style="font-weight:500;color:var(--success)">₹${g.revenue.toLocaleString('en-IN')}</td>
          <td><strong>${g.rating.toFixed(1)}</strong> <i class="fa-solid fa-star" style="color:var(--warning);font-size:.8rem"></i></td>
          <td><span class="badge badge-${badgeClass}">${badgeText}</span></td>
        </tr>
      `;
    }).join('');
  }

  function openAddGarageModal() {
    document.getElementById('gName').value = '';
    document.getElementById('garageModalOverlay').classList.add('show');
  }

  function submitGarage() {
    const name = document.getElementById('gName').value.trim();
    const status = document.getElementById('gStatus').value;
    if(!name) {
      showToast('Please enter a facility name.', 'error');
      return;
    }
    garages.unshift({ name: name, bookings: 0, revenue: 0, rating: 5.0, status: status });
    saveState();
    renderGarages();
    closeModal('garageModalOverlay');
    showToast(`${name} onboarded to partner network successfully!`, 'success');
  }

  // Initial render
  document.addEventListener('DOMContentLoaded', () => {
    renderGarages();
  });
</script>
</body>
</html>
